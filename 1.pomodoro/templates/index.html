<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>ポモドーロタイマー</h1>
        <div class="status">集中時間</div>
        <div style="position: relative; display: inline-block;">
            <canvas id="timerGauge" width="180" height="180" style="position: absolute; left: 0; top: 0; z-index: 1;"></canvas>
            <div id="timer" style="position: relative; z-index: 2; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; font-size: 64px;">25:00</div>
        </div>
        <div class="buttons">
            <button id="startBtn">開始</button>
            <button id="pauseBtn">一時停止</button>
            <button id="resetBtn">リセット</button>
        </div>
        <div id="history"></div>
    </div>
    <script src="../static/js/timer_v2.js"></script>
</body>
</html>
